name: bjcp-arena

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bjcp_arena
      POSTGRES_USER: bjcp_arena
      POSTGRES_PASSWORD: bjcp_arena
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bjcp_arena -d bjcp_arena"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
